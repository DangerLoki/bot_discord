name: Build

on:
  push:
    tags:
      - "v*"          # dispara em: git tag v1.0.0 && git push --tags

permissions:
  contents: write   # necessário para criar a Release

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: bot-discord-linux
            binary:   dist/bot-discord-linux

          - os: windows-latest
            artifact: bot-discord-windows.exe
            binary:   dist/bot-discord-windows.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar uv
        uses: astral-sh/setup-uv@v5

      - name: Instalar dependências
        run: uv pip install --system -r requirements.txt pyinstaller

      - name: Build Linux
        if: runner.os == 'Linux'
        run: |
          pyinstaller \
            --onefile \
            --name bot-discord-linux \
            --hidden-import discord \
            --hidden-import discord.opus \
            --hidden-import discord.voice_client \
            --hidden-import nacl \
            --hidden-import yt_dlp \
            --hidden-import spotipy \
            --hidden-import certifi \
            --collect-all yt_dlp \
            --collect-data certifi \
            main.py

      - name: Build Windows
        if: runner.os == 'Windows'
        run: |
          pyinstaller `
            --onefile `
            --name bot-discord-windows `
            --hidden-import discord `
            --hidden-import discord.opus `
            --hidden-import discord.voice_client `
            --hidden-import nacl `
            --hidden-import yt_dlp `
            --hidden-import spotipy `
            --hidden-import certifi `
            --collect-all yt_dlp `
            --collect-data certifi `
            main.py

      - name: Upload artefato
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/bot-discord-linux/bot-discord-linux
            artifacts/bot-discord-windows.exe/bot-discord-windows.exe